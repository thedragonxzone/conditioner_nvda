<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVDA Chart</title>
    <script src="lightweight-charts.standalone.production.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%;
            background-color: #11111b;
            color: #a6adc8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow: hidden;
        }
        #top-bar {
            height: 32px;
            background-color: #181825;
            border-bottom: 1px solid #313244;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 4px;
        }
        #top-bar .label {
            font-size: 12px;
            color: #6c7086;
            margin-right: 8px;
        }
        .interval-btn {
            background: transparent;
            border: 1px solid transparent;
            color: #a6adc8;
            font-size: 12px;
            padding: 4px 10px;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.15s ease;
        }
        .interval-btn:hover {
            background-color: #313244;
            color: #cdd6f4;
        }
        .interval-btn.active {
            background-color: #89b4fa;
            color: #11111b;
            font-weight: 600;
        }
        #chart-container {
            position: absolute;
            top: 32px;
            left: 0;
            right: 0;
            bottom: 0;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <span class="label">Interwał:</span>
        <button class="interval-btn active" data-interval="1m">1m</button>
        <button class="interval-btn" data-interval="5m">5m</button>
        <button class="interval-btn" data-interval="15m">15m</button>
        <button class="interval-btn" data-interval="1h">1h</button>
        <button class="interval-btn" data-interval="1d">1d</button>
    </div>
    <div id="chart-container"></div>

    <script>
        // === Inicjalizacja wykresu ===
        const chartContainer = document.getElementById('chart-container');
        const chart = LightweightCharts.createChart(chartContainer, {
            width: chartContainer.clientWidth,
            height: chartContainer.clientHeight,
            layout: {
                background: { type: 'solid', color: '#11111b' },
                textColor: '#a6adc8',
                fontSize: 11,
            },
            grid: {
                vertLines: { color: 'rgba(49, 50, 68, 0.4)' },
                horzLines: { color: 'rgba(49, 50, 68, 0.4)' },
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
                vertLine: { color: '#6c7086', width: 1, style: 2 },
                horzLine: { color: '#6c7086', width: 1, style: 2 },
            },
            rightPriceScale: {
                borderColor: '#313244',
                scaleMargins: { top: 0.1, bottom: 0.15 },
            },
            
            
            localization: {
                timeFormatter: (timestamp) => {
                    const date = new Date(timestamp * 1000);
                    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                },
            },
            timeScale: {
                borderColor: '#313244',
                timeVisible: true,
                secondsVisible: false,
                rightOffset: 5,
                barSpacing: 8,
                localTime: true,
            },
        });

        const candleSeries = chart.addCandlestickSeries({
            upColor: '#a6e3a1',
            downColor: '#f38ba8',
            borderUpColor: '#a6e3a1',
            borderDownColor: '#f38ba8',
            wickUpColor: '#a6e3a1',
            wickDownColor: '#f38ba8',
        });

        // Responsywność
        const resizeObserver = new ResizeObserver(entries => {
            for (const entry of entries) {
                chart.applyOptions({
                    width: entry.contentRect.width,
                    height: entry.contentRect.height,
                });
            }
        });
        resizeObserver.observe(chartContainer);

        // === Przełącznik interwałów ===
        const intervalButtons = document.querySelectorAll('.interval-btn');
        intervalButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                intervalButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const newInterval = btn.dataset.interval;
                console.log('INTERVAL_SWITCH:' + newInterval);
            });
        });

        // === ŁADOWANIE DANYCH HISTORYCZNYCH ===
        window.loadHistoricalData = function(jsonStr) {
            try {
                const data = JSON.parse(jsonStr);
                if (Array.isArray(data) && data.length > 0) {
                    candleSeries.setData(data);
                    chart.timeScale().fitContent();
                }
            } catch (e) {
                console.log("DEBUG_JS: loadHistoricalData error: " + e);
            }
        };

        // === AKTUALIZACJA REAL-TIME ===
        window.updateRealTimeBar = function(jsonStr) {
            try {
                const bar = JSON.parse(jsonStr);
                if (bar && bar.time !== undefined) {
                    candleSeries.update(bar);
                }
            } catch (e) {
                console.log("DEBUG_JS: updateRealTimeBar error: " + e);
            }
        };

        // === RYSOWANIE STREF (RANGES) ===
        let currentRangeLines = [];
        window.showRangeLines = function(jsonStr) {
            try {
                const zones = JSON.parse(jsonStr);
                if (!Array.isArray(zones)) return;
                zones.forEach(zone => {
                    const topLine = candleSeries.createPriceLine({
                        price: zone.top,
                        color: zone.borderColor,
                        lineWidth: 2,
                        lineStyle: LightweightCharts.LineStyle.Solid,
                        axisLabelVisible: true,
                        title: zone.label || '',
                    });
                    const bottomLine = candleSeries.createPriceLine({
                        price: zone.bottom,
                        color: zone.borderColor,
                        lineWidth: 2,
                        lineStyle: LightweightCharts.LineStyle.Dashed,
                        axisLabelVisible: true,
                        title: '',
                    });
                    currentRangeLines.push(topLine, bottomLine);
                });
            } catch (e) {
                console.log("DEBUG_JS: showRangeLines error: " + e);
            }
        };

        window.hideRangeLines = function() {
            currentRangeLines.forEach(line => {
                try { candleSeries.removePriceLine(line); } catch (e) {}
            });
            currentRangeLines = [];
        };

        // === RYSOWANIE SETUPÓW ===
        let currentSetupLines = [];
        window.showSetupLines = function(jsonStr) {
            try {
                const lines = JSON.parse(jsonStr);
                if (!Array.isArray(lines)) return;
                lines.forEach(line => {
                    const topLine = candleSeries.createPriceLine({
                        price: line.top,
                        color: line.borderColor,
                        lineWidth: 2,
                        lineStyle: LightweightCharts.LineStyle.Solid,
                        axisLabelVisible: true,
                        title: line.label || '',
                    });
                    const bottomLine = candleSeries.createPriceLine({
                        price: line.bottom,
                        color: line.borderColor,
                        lineWidth: 2,
                        lineStyle: LightweightCharts.LineStyle.Dashed,
                        axisLabelVisible: true,
                        title: '',
                    });
                    currentSetupLines.push(topLine, bottomLine);
                });
            } catch (e) {
                console.log("DEBUG_JS: showSetupLines error: " + e);
            }
        };

        window.hideSetupLines = function() {
            currentSetupLines.forEach(line => {
                try { candleSeries.removePriceLine(line); } catch (e) {}
            });
            currentSetupLines = [];
        };
    </script>
</body>
</html>
