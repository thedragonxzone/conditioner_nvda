<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>NASDAQ - TradingView</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%;
            background-color: #000000;
            overflow: hidden;
        }
        #tv-widget {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <iframe id="tv-widget" scrolling="no" allowtransparency="true"></iframe>

    <script>
        const symbol = "IG:NASDAQ";
        const myCustomColor = "#000000";
        const baseUrl = "https://s.tradingview.com/widgetembed/";

        const disabledFeatures = [
            "show_right_widgets_panel_by_default",
            "right_toolbar",
            "widget_logo",
            "use_localstorage_for_settings",
            "symbol_info_price_source",
            "symbol_info_long_description",
            "symbol_info_fundamentals",
            "show_symbol_info_panel",
            "symbol_info_dialog"
        ];

        const queryParams = new URLSearchParams({
            hideideas: "1",
            backgroundColor: myCustomColor,
            overrides: JSON.stringify({
                "paneProperties.background": myCustomColor,
                "paneProperties.backgroundType": "solid",
                "paneProperties.vertGridProperties.color": "rgba(42, 46, 57, 0.2)",
                "paneProperties.horzGridProperties.color": "rgba(42, 46, 57, 0.2)",
                "scalesProperties.showSeriesLastValue": true,
                "mainSeriesProperties.priceAxisProperties.showLastValue": true
            }),
            enabled_features: "[]",
            disabled_features: JSON.stringify(disabledFeatures),
            locale: "pl"
        });

        const settings = {
            "symbol": symbol,
            "frameElementId": "tv_chart_nasdaq",
            "interval": "5",
            "hide_legend": "0",
            "hide_side_toolbar": "0",
            "allow_symbol_change": "0",
            "save_image": "0",
            "studies": "VWAP@tv-basicstudies",
            "theme": "dark",
            "style": "1",
            "timezone": "Europe/Warsaw",
            "backgroundColor": myCustomColor
        };

        const iframeUrl = `${baseUrl}?${queryParams.toString()}#${encodeURIComponent(JSON.stringify(settings))}`;
        document.getElementById('tv-widget').src = iframeUrl;
    </script>
</body>
</html>
